<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <title>Work24 채용 큐레이션</title>
  <style>
    :root {
      color-scheme: light;
      --bg:#fff7fb;
      --bg2:#f6f0ff;
      --card:rgba(255,255,255,.74);
      --card-solid:#fff;
      --text:#261827;
      --muted:#7a687a;
      --soft:#9b8b9b;
      --line:rgba(93,58,94,.13);
      --accent:#ff6fae;
      --accent-2:#8e71ff;
      --accent-3:#ffd7e8;
      --chip:#fff4fa;
      --chip-line:#ffd3e7;
      --danger-bg:#fff1f3;
      --danger-text:#c94460;
      --shadow:0 24px 70px rgba(111,63,94,.16);
      --shadow-soft:0 12px 36px rgba(111,63,94,.10);
      --glass:rgba(255,255,255,.58);
    }
    html.dark {
      color-scheme: dark;
      --bg:#15111b;
      --bg2:#211526;
      --card:rgba(36,28,45,.76);
      --card-solid:#211a2a;
      --text:#fff4fb;
      --muted:#cbb8c9;
      --soft:#a995aa;
      --line:rgba(255,220,240,.14);
      --accent:#ff79b8;
      --accent-2:#b099ff;
      --accent-3:#4a263a;
      --chip:#2d2135;
      --chip-line:#4a344d;
      --danger-bg:#3b2029;
      --danger-text:#ff9caf;
      --shadow:0 24px 70px rgba(0,0,0,.34);
      --shadow-soft:0 12px 36px rgba(0,0,0,.24);
      --glass:rgba(31,24,38,.62);
    }
    * { box-sizing:border-box; }
    html { scroll-behavior:smooth; }
    body {
      margin:0;
      min-height:100vh;
      font-family: ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", "Noto Sans KR", "Apple SD Gothic Neo", sans-serif;
      background:
        radial-gradient(circle at 12% 5%, rgba(255,155,207,.46), transparent 28rem),
        radial-gradient(circle at 86% 7%, rgba(154,133,255,.36), transparent 26rem),
        linear-gradient(145deg, var(--bg), var(--bg2));
      background-attachment:fixed;
      color:var(--text);
    }
    body::before {
      content:"";
      position:fixed;
      inset:0;
      pointer-events:none;
      background-image:
        linear-gradient(rgba(255,255,255,.13) 1px, transparent 1px),
        linear-gradient(90deg, rgba(255,255,255,.09) 1px, transparent 1px);
      background-size:42px 42px;
      mask-image:linear-gradient(to bottom, rgba(0,0,0,.45), transparent 70%);
    }
    a { color:inherit; }
    button, input, select { font:inherit; }
    .wrap { position:relative; max-width:1180px; margin:0 auto; padding:44px 22px 86px; }
    .hero {
      display:grid;
      grid-template-columns: minmax(0, 1fr) auto;
      gap:24px;
      align-items:end;
      margin-bottom:22px;
    }
    .eyebrow { display:inline-flex; align-items:center; gap:8px; padding:8px 12px; border:1px solid var(--line); border-radius:999px; background:var(--glass); backdrop-filter:blur(18px); color:var(--muted); font-size:13px; box-shadow:var(--shadow-soft); }
    h1 { margin:14px 0 10px; font-size:clamp(36px, 7vw, 76px); line-height:.95; letter-spacing:-.075em; font-weight:860; }
    .hero-gradient { background:linear-gradient(110deg, var(--text), var(--accent), var(--accent-2)); -webkit-background-clip:text; background-clip:text; color:transparent; }
    .sub { max-width:720px; color:var(--muted); font-size:15px; line-height:1.7; word-break:keep-all; }
    .hero-panel { min-width:220px; padding:18px; border:1px solid var(--line); border-radius:28px; background:var(--glass); backdrop-filter:blur(18px); box-shadow:var(--shadow); }
    .stat { display:grid; grid-template-columns:1fr auto; align-items:end; gap:10px; }
    .stat span { color:var(--muted); font-size:13px; }
    .stat b { font-size:42px; line-height:.9; letter-spacing:-.05em; }
    .theme-toggle { width:100%; margin-top:16px; border:0; border-radius:999px; padding:12px 14px; color:white; background:linear-gradient(135deg, var(--accent), var(--accent-2)); cursor:pointer; box-shadow:0 12px 30px rgba(255,111,174,.22); }

    .controls { position:sticky; top:12px; z-index:10; margin:24px 0 22px; padding:12px; border:1px solid var(--line); border-radius:26px; background:var(--glass); backdrop-filter:blur(22px); box-shadow:var(--shadow-soft); }
    .toolbar { display:grid; grid-template-columns:minmax(0, 1.5fr) 190px 170px; gap:10px; }
    .quickbar { display:flex; flex-wrap:wrap; gap:8px; margin-top:10px; }
    input, select {
      width:100%; border:1px solid var(--line); background:rgba(255,255,255,.64); color:var(--text); border-radius:18px; padding:13px 14px; outline:none;
    }
    html.dark input, html.dark select { background:rgba(26,20,33,.78); }
    input:focus, select:focus { border-color:rgba(255,111,174,.65); box-shadow:0 0 0 5px rgba(255,111,174,.12); }
    .pill-btn { border:1px solid var(--line); background:rgba(255,255,255,.55); color:var(--muted); border-radius:999px; padding:10px 13px; cursor:pointer; transition:.18s ease; }
    html.dark .pill-btn { background:rgba(26,20,33,.68); }
    .pill-btn:hover { transform:translateY(-1px); color:var(--text); border-color:var(--chip-line); }
    .pill-btn.active { color:#fff; border-color:transparent; background:linear-gradient(135deg, var(--accent), var(--accent-2)); box-shadow:0 10px 26px rgba(255,111,174,.22); }

    .grid { display:grid; grid-template-columns:repeat(auto-fill, minmax(330px, 1fr)); gap:18px; align-items:stretch; }
    .card {
      position:relative;
      overflow:hidden;
      display:flex;
      flex-direction:column;
      min-height:500px;
      padding:21px;
      border:1px solid var(--line);
      border-radius:34px;
      background:linear-gradient(160deg, rgba(255,255,255,.87), var(--card));
      box-shadow:var(--shadow-soft);
      transform:translateZ(0);
    }
    html.dark .card { background:linear-gradient(160deg, rgba(50,39,61,.88), var(--card)); }
    .card::before { content:""; position:absolute; width:170px; height:170px; right:-60px; top:-70px; border-radius:50%; background:radial-gradient(circle, rgba(255,111,174,.32), transparent 68%); pointer-events:none; }
    .card:hover { box-shadow:var(--shadow); transform:translateY(-2px); transition:.18s ease; }
    .card-top { position:relative; display:grid; grid-template-columns:minmax(0, 1fr) auto; gap:10px; align-items:start; color:var(--muted); font-size:13px; margin-bottom:14px; }
    .company { font-weight:800; color:var(--text); overflow:hidden; text-overflow:ellipsis; white-space:nowrap; }
    .date-line { display:flex; align-items:center; gap:7px; color:var(--soft); white-space:nowrap; }
    .heart { width:38px; height:38px; display:grid; place-items:center; border:1px solid var(--line); background:rgba(255,255,255,.52); border-radius:50%; cursor:pointer; color:var(--soft); font-size:18px; }
    html.dark .heart { background:rgba(25,20,32,.62); }
    .heart.saved { color:#fff; border-color:transparent; background:linear-gradient(135deg, #ff5d9e, #ff8dbf); box-shadow:0 10px 24px rgba(255,93,158,.28); }
    .title { position:relative; margin:0 0 14px; font-size:clamp(21px, 2.2vw, 27px); line-height:1.28; letter-spacing:-.045em; font-weight:860; word-break:keep-all; }
    .title a { text-decoration:none; }
    .title a:hover { color:var(--accent); }
    .chips { display:flex; flex-wrap:wrap; gap:8px; margin-bottom:15px; }
    .chip { max-width:100%; border:1px solid var(--chip-line); background:var(--chip); color:var(--text); border-radius:999px; padding:7px 10px; font-size:12.5px; line-height:1.2; overflow:hidden; text-overflow:ellipsis; white-space:nowrap; }
    .deadline-chip { display:inline-flex; align-items:center; gap:5px; border:1px solid rgba(255,125,145,.25); background:var(--danger-bg); color:var(--danger-text); border-radius:999px; padding:7px 10px; font-size:12.5px; font-weight:800; }
    .meta { display:grid; grid-template-columns:68px minmax(0, 1fr); gap:7px 10px; padding:12px 0 4px; border-top:1px dashed var(--line); color:var(--muted); font-size:13.5px; }
    .meta .k { color:var(--soft); }
    .meta .v { color:var(--muted); overflow-wrap:anywhere; }
    .desc { margin:14px 0 15px; color:var(--muted); opacity:.72; line-height:1.72; font-size:12.8px; white-space:pre-line; display:-webkit-box; -webkit-line-clamp:5; -webkit-box-orient:vertical; overflow:hidden; }
    .ai { margin-top:auto; border:1px solid rgba(142,113,255,.19); background:linear-gradient(145deg, rgba(255,244,250,.82), rgba(246,240,255,.82)); border-radius:24px; padding:13px; }
    html.dark .ai { background:linear-gradient(145deg, rgba(46,32,50,.82), rgba(34,30,52,.82)); }
    .ai-head { display:flex; align-items:center; justify-content:space-between; gap:10px; }
    .ai-title { font-weight:850; letter-spacing:-.02em; }
    .score { display:inline-flex; align-items:center; gap:5px; color:#fff; background:linear-gradient(135deg, var(--accent), var(--accent-2)); border-radius:999px; padding:7px 10px; font-weight:850; font-size:12.5px; white-space:nowrap; }
    .more { margin-top:10px; width:100%; border:0; background:transparent; color:var(--accent); cursor:pointer; font-weight:800; text-align:left; padding:4px 0; }
    .ai-detail { display:none; margin-top:8px; color:var(--muted); line-height:1.65; font-size:13.3px; }
    .card.open .ai-detail { display:block; }
    .ai-label { margin:12px 0 5px; color:var(--text); font-weight:850; font-size:12px; }
    .mini-tags { display:flex; flex-wrap:wrap; gap:6px; }
    .mini-tag { border-radius:999px; background:rgba(255,255,255,.58); border:1px solid var(--line); padding:6px 8px; font-size:12px; color:var(--muted); }
    html.dark .mini-tag { background:rgba(20,16,26,.48); }
    .empty { display:none; border:1px dashed var(--line); border-radius:30px; padding:44px 24px; text-align:center; color:var(--muted); background:var(--glass); backdrop-filter:blur(18px); }
    footer { margin-top:34px; color:var(--muted); font-size:13px; line-height:1.6; }

    @media (max-width: 780px) {
      .wrap { padding:24px 14px 64px; }
      .hero { display:block; }
      .hero-panel { margin-top:18px; }
      .controls { top:8px; border-radius:24px; }
      .toolbar { grid-template-columns:1fr; }
      .quickbar { display:grid; grid-template-columns:1fr 1fr; }
      .grid { grid-template-columns:1fr; gap:16px; scroll-snap-type:y proximity; }
      .card { min-height:calc(100svh - 122px); scroll-snap-align:start; border-radius:32px; padding:20px; }
      .title { font-size:28px; }
      .desc { -webkit-line-clamp:6; }
    }
    @media (max-width: 430px) {
      .quickbar { grid-template-columns:1fr; }
      .card { min-height:calc(100svh - 104px); }
      .card-top { grid-template-columns:1fr; }
      .date-line { justify-content:space-between; }
    }
  </style>
  <script>
    (function(){
      const saved = localStorage.getItem('work24-theme');
      const prefersDark = window.matchMedia && window.matchMedia('(prefers-color-scheme: dark)').matches;
      if (saved === 'dark' || (!saved && prefersDark)) document.documentElement.classList.add('dark');
    })();
  </script>

  <script>

    let showUntilOnly = false;

    function escapeHtml(s) { return String(s ?? '').replace(/[&<>'"]/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;',"'":'&#39;','"':'&quot;'}[c])); }
    function isUnknown(s) { const v = String(s ?? '').trim(); return !v || ['정보 없음','등록일자 미상','없음','해당없음','해당 없음','null','undefined','-'].includes(v); }
    function compactRegion(r) { return String(r || '').replace(/^경상남도\s*/, '').split(',')[0].trim(); }
    const REGION_FILTERS = [
      '창원시 마산합포구',
      '창원시 마산회원구',
      '창원시 성산구',
      '창원시 의창구',
      '창원시 진해구',
    ];
    function getRegionGroup(regionText) {
      const region = String(regionText || '').trim();
      for (const key of REGION_FILTERS) {
        if (region.includes(key)) return key;
      }
      return '기타';
    }
    function parseDateValue(s) {
      if (isUnknown(s)) return null;
      const m = String(s).match(/(\d{4})[-.](\d{1,2})[-.](\d{1,2})/);
      if (!m) return null;
      return new Date(Number(m[1]), Number(m[2]) - 1, Number(m[3]));
    }
    function timeValue(s) { const d = parseDateValue(s); return d ? d.getTime() : null; }
    function registeredLabel(s) {
      const d = parseDateValue(s);
      if (!d) return '등록일자 미상';
      return `${d.getMonth() + 1}월 ${d.getDate()}일`;
    }
    function closingLabel(j) {
      if (Number(j.is_until_hired) === 1 || String(j.closing_text || '').includes('채용시까지')) return '채용시까지';
      const d = parseDateValue(j.closing_date || j.closing_text);
      if (!d) return escapeHtml(j.closing_text || '마감일 미상');
      const today = new Date();
      const today0 = new Date(today.getFullYear(), today.getMonth(), today.getDate());
      const diff = Math.ceil((d.getTime() - today0.getTime()) / 86400000);
      const dday = diff === 0 ? 'D-Day' : diff > 0 ? `D-${diff}` : `D+${Math.abs(diff)}`;
      return `${dday} (${d.getMonth() + 1}월 ${d.getDate()}일)`;
    }
    function cleanDesc(s) { return String(s || '').trim(); }
    function fmtScore(v) {
      const n = Number(v || 0);
      if (!Number.isFinite(n)) return '0';
      return Number.isInteger(n) ? String(n) : n.toFixed(1).replace(/\.0$/, '');
    }
    function loadSavedIds() {
      try { return new Set(JSON.parse(localStorage.getItem('work24-scraps') || '[]')); }
      catch { return new Set(); }
    }
    function persistSavedIds() { localStorage.setItem('work24-scraps', JSON.stringify([...savedIds])); }
    function toggleScrap(id) {
      if (savedIds.has(id)) savedIds.delete(id); else savedIds.add(id);
      persistSavedIds();
      render();
    }
    function setupRegions() {
      const fixedRegions = [...REGION_FILTERS, '기타'];
      for (const r of fixedRegions) {
        const opt = document.createElement('option');
        opt.value = r;
        opt.textContent = r;
        regionFilter.appendChild(opt);
      }
    }
    function sortJobs(arr) {
      const missingLast = (av, bv, dir='desc') => {
        const am = av === null || av === undefined;
        const bm = bv === null || bv === undefined;
        if (am && bm) return 0;
        if (am) return 1;
        if (bm) return -1;
        return dir === 'asc' ? av - bv : bv - av;
      };
      arr.sort((a,b) => {
        if (sort.value === 'registered_asc') return missingLast(timeValue(a.registered_at), timeValue(b.registered_at), 'asc');
        if (sort.value === 'closing_asc') return missingLast(deadlineSortValue(a), deadlineSortValue(b), 'asc');
        if (sort.value === 'closing_desc') return missingLast(deadlineSortValue(a), deadlineSortValue(b), 'desc');
        if (sort.value === 'ai_desc') return (Number(b.llm_score || 0) - Number(a.llm_score || 0)) || missingLast(timeValue(a.registered_at), timeValue(b.registered_at), 'desc');
        return missingLast(timeValue(a.registered_at), timeValue(b.registered_at), 'desc');
      });
    }
    function deadlineSortValue(j) {
      if (Number(j.is_until_hired) === 1 || String(j.closing_text || '').includes('채용시까지')) return null;
      return timeValue(j.closing_date || j.closing_text);
    }

      if (needle && !hay.includes(needle)) return false;

      if (showUntilOnly && !(Number(j.is_until_hired) === 1 || String(j.closing_text || '').includes('채용시까지'))) return false;

      return true;
    }

      const desc = cleanDesc(j.job_description);

          </div>
          <h2 class="title"><a href="${escapeHtml(j.detail_url)}" target="_blank" rel="noopener">${escapeHtml(j.title)}</a></h2>
          <div class="chips">${tags.map(t => `<span class="chip">${escapeHtml(t)}</span>`).join('')}</div>

            <span class="k">경력</span><span class="v">${escapeHtml([j.career, j.education].filter(v => !isUnknown(v)).join(' / ') || '정보 없음')}</span>

          ${desc ? `<p class="desc">${escapeHtml(desc)}</p>` : ''}
          <section class="ai" aria-label="AI 의견">
            <div class="ai-head"><span class="ai-title">🤖 AI 의견</span><span class="score">AI 점수 ${escapeHtml(fmtScore(j.llm_score))}</span></div>
            <button class="more" type="button" data-more>더보기</button>
            <div class="ai-detail">
              ${j.llm_reason ? `<div class="ai-label">AI 생각</div><div>${escapeHtml(j.llm_reason)}</div>` : ''}
              ${matched.length ? `<div class="ai-label">매칭 키워드</div><div class="mini-tags">${matched.map(x => `<span class="mini-tag">${escapeHtml(x)}</span>`).join('')}</div>` : ''}
              ${risks.length ? `<div class="ai-label">고려사항</div><div class="mini-tags">${risks.map(x => `<span class="mini-tag">${escapeHtml(x)}</span>`).join('')}</div>` : ''}
            </div>
          </section>
        </article>`;
    }
    function render() {
      const needle = q.value.trim().toLowerCase();
      const rf = regionFilter.value;
      let arr = jobs.filter(j => passFilters(j, needle, rf));
      sortJobs(arr);
      count.textContent = arr.length;
      empty.style.display = arr.length ? 'none' : 'block';
      cards.innerHTML = arr.map(cardHtml).join('');
    }

    setupRegions();
    render();
    q.addEventListener('input', render);
    sort.addEventListener('change', render);
    regionFilter.addEventListener('change', render);
    untilToggle.addEventListener('click', () => { showUntilOnly = !showUntilOnly; untilToggle.classList.toggle('active', showUntilOnly); render(); });
    scrapToggle.addEventListener('click', () => { showScrapOnly = !showScrapOnly; scrapToggle.classList.toggle('active', showScrapOnly); render(); });
    themeToggle.addEventListener('click', () => {
      document.documentElement.classList.toggle('dark');
      const isDark = document.documentElement.classList.contains('dark');
      localStorage.setItem('work24-theme', isDark ? 'dark' : 'light');
      themeToggle.textContent = isDark ? '☀️ 라이트모드' : '🌙 다크모드';
    });
    themeToggle.textContent = document.documentElement.classList.contains('dark') ? '☀️ 라이트모드' : '🌙 다크모드';
    cards.addEventListener('click', (e) => {
      const heart = e.target.closest('[data-heart]');
      if (heart) { toggleScrap(heart.dataset.heart); return; }
      const more = e.target.closest('[data-more]');
      if (more) {
        const card = more.closest('.card');
        const open = card.classList.toggle('open');
        more.textContent = open ? '접기' : '더보기';
      }
    });
  </script>
</body>
</html>
